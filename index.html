<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtomStack FAQ 帮助中心</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; }
      #loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; background: #0d1b2a; color: #fff; gap: 20px;
      }
      .loading-logo {
        width: 52px; height: 52px; border-radius: 14px;
        background: linear-gradient(135deg, #1a73e8, #0d47a1);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 900; color: #fff;
        animation: logoPulse 2s ease-in-out infinite;
      }
      .loading-text { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.7); }
      .loading-text span { animation: pulse 1.5s ease-in-out infinite; }
      .loading-bar {
        width: 120px; height: 3px; background: rgba(255,255,255,0.1);
        border-radius: 2px; overflow: hidden;
      }
      .loading-bar::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: #1a73e8; border-radius: 2px;
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes logoPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-logo">A</div>
      <div class="loading-text"><span>AtomStack FAQ 系统加载中...</span></div>
      <div class="loading-bar"></div>
    </div>
    <div id="app" style="display:none"></div>
    <script>
      function showApp() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      }
      if (document.readyState === 'complete') {
        setTimeout(showApp, 100);
      } else {
        window.addEventListener('load', () => setTimeout(showApp, 100));
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
